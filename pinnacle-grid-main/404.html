<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 - Page Not Found | Pinnacle Grid</title>
  <meta http-equiv="refresh" content="5;url=index.html">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;display=swap" rel="stylesheet">
  <link href="assets/vendors/bootstrap/bootstrap.min.css" rel="stylesheet">
  <link href="assets/vendors/bootstrap-icons/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="assets/vendors/aos/aos.css" rel="stylesheet">
  <link rel="icon" type="image/png" href="assets/images/favicon-32x32.png">
  <link href="assets/css/style.css" rel="stylesheet">
  <style>
    body, html {
      height: 100%;
      overflow: hidden;
    }
    .error-container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      background: #f8f9fa;
    }
    .error-code {
      font-size: 150px;
      font-weight: 900;
      color: var(--bs-primary);
      margin-bottom: 30px;
      line-height: 1;
    }
    .error-message {
      font-size: 24px;
      font-weight: 500;
      color: #333;
      margin-bottom: 20px;
    }
    .error-description {
      color: #777;
      margin-bottom: 40px;
      max-width: 500px;
    }
    .redirect-timer {
      font-weight: 700;
      color: var(--bs-primary);
    }
  </style>
</head>

<body>
  <div class="error-container p-4">
    <div class="error-code" data-aos="zoom-in">404</div>
    <h1 class="error-message" data-aos="fade-up">Oops! You have entered an invalid URL.</h1>
    <p class="error-description" data-aos="fade-up" data-aos-delay="100">
      The page you are looking for does not exist or has been moved. You will be automatically redirected to the home page in <span id="timer" class="redirect-timer">5</span> seconds.
    </p>
    <a href="index.html" class="btn btn-primary px-5 py-3 shadow-lg btn-lg" data-aos="fade-up" data-aos-delay="200">
      Back to Home
    </a>

    <div class="mt-5 text-muted small" data-aos="fade-in" data-aos-delay="500">
      &copy; <script>document.write(new Date().getFullYear());</script> Pinnacle Grid. All rights reserved.
    </div>
  </div>

  <script src="assets/vendors/aos/aos.js"></script>
  <script>
    AOS.init();
    let timeLeft = 5;
    let timerElement = document.getElementById("timer");
    let countdown = setInterval(function() {
      timeLeft--;
      timerElement.textContent = timeLeft;
      if (timeLeft <= 0) {
        clearInterval(countdown);
      }
    }, 1000);
  </script>
</body>

</html>
